<mat-card class="card">
    <mat-card-header>
        <mat-card-title>{{projectname}}</mat-card-title>
        <mat-card-subtitle>Acessar</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content class="container">
        <mat-form-field>
            <input matInput placeholder="Email">
        </mat-form-field>

        <mat-form-field>
            <input matInput placeholder="Senha">
        </mat-form-field>
    </mat-card-content>

    <mat-card-actions>
        <button mat-button (click)="login()">Entrar</button>
    </mat-card-actions>
</mat-card>
