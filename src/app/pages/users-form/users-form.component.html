<div class="breadcumbs">
    <a routerLink="/home">
        <mat-icon style="vertical-align: -5px !important;">dashboard</mat-icon>
        <span>Dashboard</span>
    </a>
    <span> > </span>
    <a routerLink="/users">
        <mat-icon style="vertical-align: -5px !important;">group</mat-icon>
        <span>Usuários</span>
    </a>
    <span> > </span>
    <span class="active"> Formulário de Usuário </span>
</div>

<mat-card class="card">
    <mat-card-header>
        <mat-card-title>Usuários</mat-card-title>
        <mat-card-subtitle>Formulário de Usuário</mat-card-subtitle>
    </mat-card-header>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <mat-card-content class="container">
            <mat-form-field>
                <mat-icon matPrefix>face</mat-icon>
                <input formControlName="name" matInput placeholder="Nome">
            </mat-form-field>

            <mat-form-field>
                <mat-icon matPrefix>email</mat-icon>
                <input formControlName="email" matInput type="email" placeholder="Email">
            </mat-form-field>

            <mat-form-field>
                <mat-icon matPrefix>{{hide ? 'lock' : 'lock_open'}}</mat-icon>
                <input formControlName="password" matInput placeholder="Senha" [type]="hide ? 'password' : 'text'">
                <mat-icon matSuffix (click)="hide = !hide">{{hide ? 'visibility' : 'visibility_off'}}</mat-icon>
            </mat-form-field>

            <mat-checkbox formControlName="admin">Administrador</mat-checkbox>
        </mat-card-content>

        <mat-card-actions>
            <button mat-raised-button color="primary" type="submit">Salvar</button>
            <button mat-raised-button routerLink="/users">Cancelar</button>
        </mat-card-actions>
    </form>
</mat-card>
