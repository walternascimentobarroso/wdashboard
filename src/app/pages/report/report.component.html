<div class="breadcumbs">
    <a routerLink="/home">
        <mat-icon style="vertical-align: -5px !important;">dashboard</mat-icon>
        <span>Dashboard</span>
    </a>
    <span> > </span>
    <span class="active"> Relatórios </span>
</div>

<mat-card class="card">
    <mat-card-header>
        <mat-card-title>Relatórios</mat-card-title>
        <mat-card-subtitle>Lista de para exportação em PDF</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
        <div class="flex">
            <span class="fill-space"></span>
            <button mat-fab align="end" (click)="demoFromHTML()">
                <mat-icon>picture_as_pdf</mat-icon>
            </button>
            <button mat-fab align="end" (click)="downloadXLS()">
                <mat-icon>home</mat-icon>
            </button>
        </div>
        <div id="content" #content>
            <my-table></my-table>
        </div>
    </mat-card-content>
</mat-card>
