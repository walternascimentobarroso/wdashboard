<mat-card class="card">
    <mat-card-header>
        <mat-card-title>Perfil</mat-card-title>
        <mat-card-subtitle>Usuário</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content class="example-container">
        <mat-form-field>
            <input matInput placeholder="Nome">
        </mat-form-field>

        <mat-form-field>
            <input matInput placeholder="Email">
        </mat-form-field>

        <mat-form-field>
            <input matInput placeholder="Senha">
        </mat-form-field>

        <mat-form-field>
            <mat-select placeholder="Sexo">
                <mat-option value="option">Masculino</mat-option>
                <mat-option value="option">Feminino</mat-option>
            </mat-select>
        </mat-form-field>
    </mat-card-content>

    <mat-card-actions>
        <button mat-button>Salvar</button>
        <button mat-button>Cancelar</button>
    </mat-card-actions>
</mat-card>
