<div class="lock-page">
    <div class="content">
        <mat-card class="card">
            <mat-card-header>
                <mat-card-title><h2>{{projectname}}</h2></mat-card-title>
            </mat-card-header>

            <mat-card-content class="container">

                <mat-form-field>
                    <input matInput placeholder="Senha" [type]="hide ? 'password' : 'text'">
                    <mat-icon matSuffix (click)="hide = !hide">{{hide ? 'visibility' : 'visibility_off'}}</mat-icon>
                </mat-form-field>
            </mat-card-content>

            <mat-card-actions>
                <button mat-raised-button color="primary" (click)="login()">Entrar</button>
            </mat-card-actions>
        </mat-card>
    </div>
</div>
