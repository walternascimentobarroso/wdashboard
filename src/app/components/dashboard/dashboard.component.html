<div class="grid-container">
    <h1 class="mat-h1">Dashboard</h1>

    <div fxLayout="row" fxLayout.xs="column" fxFlexFill>
        <div fxFlex>
            <app-stat [bgClass]="'danger'" [icon]="'dashboard'" [count]="13" [label]="'New Tickets!'"></app-stat>
        </div>
        <div fxFlex>
            <app-stat [bgClass]="'warn'" [icon]="'view_list'" [count]="12" [label]="'New task!'"></app-stat>
        </div>
        <div fxFlex>
            <app-stat [bgClass]="'success'" [icon]="'shopping_cart'" [count]="124" [label]="'New Orders!'"></app-stat>
        </div>
        <div fxFlex>
            <app-stat [bgClass]="'info'" [icon]="'contact_support'" [count]="13" [label]="'New Tickets!'"></app-stat>
        </div>
    </div>


    <div fxLayout="row" fxLayout.xs="column" fxFlexFill fxLayoutGap="20px">
        <div fxFlex>
            <mat-card>
                <mat-card-header>
                    <mat-card-title>Total</mat-card-title>
                </mat-card-header>
                <mat-card-content style="display: block">
                    <canvas baseChart [datasets]="barChartData" [labels]="barChartLabels" [options]="barChartOptions" [legend]="barChartLegend"
                        [chartType]="barChartType" (chartHover)="chartHovered($event)" (chartClick)="chartClicked($event)"></canvas>
                </mat-card-content>
            </mat-card>
        </div>
    </div>
</div>
